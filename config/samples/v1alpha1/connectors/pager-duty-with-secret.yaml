apiVersion: coralogix.com/v1alpha1
kind: Connector
metadata:
  labels:
    app.kubernetes.io/name: coralogix-operator
    app.kubernetes.io/instance: connector-sample
    app.kubernetes.io/part-of: coralogix-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: coralogix-operator
  name: pager-duty-with-secret-sample
spec:
  name: pager-duty-with-secret-sample
  description: PagerDuty connector using Kubernetes Secret for the integration key
  type: pagerDuty
  connectorConfig:
    fields:
      - fieldName: integrationKey
        secretKeyRef:
          name: pagerduty-secrets
          key: integration-key
---
apiVersion: v1
kind: Secret
metadata:
  name: pagerduty-secrets
type: Opaque
stringData:
  integration-key: your-pagerduty-integration-key
