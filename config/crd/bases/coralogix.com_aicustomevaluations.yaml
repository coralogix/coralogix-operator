---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: aicustomevaluations.coralogix.com
spec:
  group: coralogix.com
  names:
    kind: AICustomEvaluation
    listKind: AICustomEvaluationList
    plural: aicustomevaluations
    singular: aicustomevaluation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.printableStatus
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AICustomEvaluation is the Schema for the AI custom evaluations API.
          See also https://coralogix.com/docs/user-guides/ai/
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AICustomEvaluationSpec defines the desired state of AICustomEvaluation.
            properties:
              applications:
                description: AI applications to link this custom evaluation to, selected
                  by application and subsystem. Defaults to no linked applications.
                items:
                  properties:
                    application:
                      description: AI application name.
                      maxLength: 256
                      minLength: 1
                      type: string
                    subsystem:
                      description: AI application subsystem.
                      maxLength: 256
                      minLength: 1
                      type: string
                  required:
                  - application
                  - subsystem
                  type: object
                maxItems: 1024
                type: array
                x-kubernetes-list-map-keys:
                - application
                - subsystem
                x-kubernetes-list-type: map
              criteria:
                description: Acceptable and prohibited criteria for this custom evaluation.
                  Defaults to empty criteria.
                properties:
                  acceptable:
                    description: Criteria and examples for acceptable responses.
                    properties:
                      examples:
                        description: Example conversations for this criterion.
                        items:
                          maxLength: 65536
                          minLength: 1
                          type: string
                        maxItems: 100
                        type: array
                      flags:
                        default: ""
                        description: Criterion flags.
                        maxLength: 65536
                        type: string
                    type: object
                  prohibited:
                    description: Criteria and examples for prohibited responses.
                    properties:
                      examples:
                        description: Example conversations for this criterion.
                        items:
                          maxLength: 65536
                          minLength: 1
                          type: string
                        maxItems: 100
                        type: array
                      flags:
                        default: ""
                        description: Criterion flags.
                        maxLength: 65536
                        type: string
                    type: object
                type: object
                x-kubernetes-validations:
                - message: criteria can include at most 100 total examples across
                    acceptable and prohibited criteria
                  rule: (!has(self.acceptable) || !has(self.acceptable.examples) ||
                    !has(self.prohibited) || !has(self.prohibited.examples)) || size(self.acceptable.examples)
                    + size(self.prohibited.examples) <= 100
              description:
                description: Human-readable description.
                maxLength: 65536
                type: string
              instructions:
                description: Instructions sent to the LLM evaluator. Must contain
                  at least one of {prompt}, {response}, or {chat_history}.
                maxLength: 1048576
                minLength: 1
                pattern: \{(prompt|response|chat_history)\}
                type: string
              name:
                description: Display name of the custom evaluation.
                maxLength: 256
                minLength: 1
                type: string
              policyType:
                description: Policy type identifier.
                enum:
                - quality
                - security
                maxLength: 256
                minLength: 1
                type: string
              shouldIncludeSystemPrompt:
                default: false
                description: Whether to include the system prompt in the LLM input.
                  Defaults to false.
                type: boolean
            required:
            - instructions
            - name
            - policyType
            type: object
          status:
            description: AICustomEvaluationStatus defines the observed state of AICustomEvaluation.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              id:
                type: string
              printableStatus:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
