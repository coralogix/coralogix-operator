---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: aievaluations.coralogix.com
spec:
  group: coralogix.com
  names:
    kind: AIEvaluation
    listKind: AIEvaluationList
    plural: aievaluations
    singular: aievaluation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.printableStatus
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AIEvaluation is the Schema for the AI evaluations API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIEvaluationSpec defines the desired state of AIEvaluation.
            properties:
              application:
                description: Name of the AI application this evaluation belongs to.
                maxLength: 256
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.application is immutable
                  rule: self == oldSelf
              config:
                description: AI evaluation configuration.
                properties:
                  pii:
                    description: Configuration for PII evaluation.
                    properties:
                      categories:
                        description: PII categories to detect.
                        items:
                          enum:
                          - PHONE_NUMBER
                          - EMAIL_ADDRESS
                          - CREDIT_CARD
                          - IBAN_CODE
                          - US_SSN
                          type: string
                        maxItems: 1024
                        minItems: 1
                        type: array
                        x-kubernetes-list-type: set
                    required:
                    - categories
                    type: object
                  toxicity:
                    additionalProperties:
                      type: string
                    description: Configuration for Toxicity evaluation. Toxicity has
                      no nested fields and must be set to an empty object.
                    maxProperties: 0
                    type: object
                type: object
                x-kubernetes-validations:
                - message: 'Exactly one of the following AI evaluation configs must
                    be set: pii, toxicity'
                  rule: '(has(self.pii) ? 1 : 0) + (has(self.toxicity) ? 1 : 0) ==
                    1'
              isEnabled:
                default: true
                description: Whether the evaluation is active.
                type: boolean
              subsystem:
                description: Subsystem within the application.
                maxLength: 256
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.subsystem is immutable
                  rule: self == oldSelf
              target:
                description: Target span content the evaluation runs against.
                enum:
                - prompt
                - response
                type: string
                x-kubernetes-validations:
                - message: spec.target is immutable
                  rule: self == oldSelf
              threshold:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Score threshold. Must be between 0.0 and 1.0 inclusive.
                  Fractional values must be supplied as quoted quantities, for example "0.8".
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
            required:
            - application
            - config
            - subsystem
            - target
            - threshold
            type: object
          status:
            description: AIEvaluationStatus defines the observed state of AIEvaluation.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              id:
                type: string
              printableStatus:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
